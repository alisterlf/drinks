<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IBA Drinks</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="./app.ts"></script>
  </head>
  <body data-page="index">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="IBA Drinks home" data-i18n="brand">Drinks</a>
      <div class="header-actions">
        <label class="language-control">
          <span data-i18n="languageLabel">Language</span>
          <select data-language-select aria-label="Language">
            <option value="en">EN</option>
            <option value="pt-BR">PT-BR</option>
          </select>
        </label>
        <a class="back-link" href="ingredients.html" data-i18n="allIngredients">Ingredients</a>
      </div>
    </header>

    <main class="page-shell">
      <section class="intro" aria-labelledby="page-title">
        <p class="eyebrow" data-i18n="indexEyebrow">Cocktail index</p>
        <h1 id="page-title" data-i18n="indexTitle">My drinks.</h1>
      </section>

      <drink-filters class="filters" aria-label="Drink filters"></drink-filters>
      <p class="drink-count" data-drink-count aria-live="polite"></p>
      <drink-grid class="drink-grid" role="list" aria-label="Drink list" aria-live="polite"></drink-grid>
    </main>

    <template id="drink-filters-template">
      <section class="filter-panel" aria-labelledby="filters-title">
        <h2 id="filters-title" data-i18n="filtersTitle">Filters</h2>
        <div class="filter-controls">
          <label class="search-control">
            <span data-i18n="searchLabel">Search</span>
            <input
              type="search"
              autocomplete="off"
              data-search-input
              data-i18n-placeholder="searchPlaceholder"
              placeholder="Search by drink or ingredient"
            />
          </label>
          <div class="filter-actions">
            <button class="filter-chip filter-chip-favorite" type="button" data-favorites-filter>
              <span aria-hidden="true"></span>
              <span data-i18n="filterFavorites">Only favorites</span>
            </button>
            <div class="filter-segment" role="group" aria-label="Ingredient availability">
              <button class="filter-chip" type="button" data-inventory-filter="all" data-i18n="filterInventoryAll">
                All drinks
              </button>
              <button class="filter-chip" type="button" data-inventory-filter="makeable" data-i18n="filterMakeable">
                Ready to make
              </button>
              <button class="filter-chip" type="button" data-inventory-filter="missing" data-i18n="filterMissing">
                Need shopping
              </button>
            </div>
            <div class="filter-chip-group" data-filter-options></div>
          </div>
        </div>
      </section>
    </template>

    <template id="filter-option-template">
      <button class="filter-chip" type="button"></button>
    </template>

    <template id="drink-card-template">
      <article class="drink-card" role="listitem">
        <button class="favorite-button" type="button" data-favorite-button>
          <span aria-hidden="true"></span>
        </button>
        <a class="drink-card-link">
          <figure class="drink-card-figure">
            <img loading="lazy" alt="" />
            <figcaption class="drink-card-body">
              <h2></h2>
              <p class="ingredient-legend"></p>
            </figcaption>
          </figure>
        </a>
      </article>
    </template>

    <template id="empty-state-template">
      <section class="empty-state">
        <p></p>
      </section>
    </template>
  </body>
</html>
